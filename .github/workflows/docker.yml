name: Build & Push to Docker Hub

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "backend/**"
      - "frontend/**"
      - "docker/scripts/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest   # native linux/amd64 — no QEMU needed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: adidix/prostate3d:latest
          cache-from: type=registry,ref=adidix/prostate3d:buildcache
          cache-to:   type=registry,ref=adidix/prostate3d:buildcache,mode=max

      - name: Print Minerva pull command
        run: |
          echo "Image pushed to Docker Hub. On Minerva interactive node, run:"
          echo ""
          echo "  singularity build /sc/arion/projects/video_rarp/3dprostate/pipeline.sif \\"
          echo "    docker://adidix/prostate3d:latest"
