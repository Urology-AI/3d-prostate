name: Build & Push to GHCR

# Triggers
on:
  push:
    branches: [main]
    paths:
      # Only rebuild when something that affects the image changes
      - "Dockerfile"
      - "requirements.txt"
      - "backend/**"
      - "frontend/**"
      - "docker/scripts/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:   # manual trigger from the Actions tab

# Need write access to push to ghcr.io
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest   # ubuntu-latest IS linux/amd64 — no QEMU needed

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Lowercase the owner name (Docker registry requires lowercase) ─────
      - name: Set lowercase owner
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # ── 3. Buildx (needed for advanced cache support) ────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to GHCR (uses built-in GITHUB_TOKEN — no secrets needed) ──
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Derive image metadata ─────────────────────────────────────────────
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.lower.outputs.owner }}/prostate3d
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      # ── 6. Build & push ──────────────────────────────────────────────────────
      #
      #  Cache strategy
      #  --------------
      #  cache-from: pull the previously pushed :buildcache image.
      #    On the first ever build this is empty (cache miss = full build).
      #    On every subsequent build only changed layers are rebuilt.
      #
      #  cache-to:   push the new cache back to :buildcache with mode=max
      #    (stores ALL intermediate layers, not just the final image).
      #    This gives maximum cache hits on the next build.
      #
      #  For a fresh repo the first build takes ~45-60 min.
      #  After that, a code-only change rebuilds in ~1-3 min.
      #
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.lower.outputs.owner }}/prostate3d:buildcache
          cache-to:   type=registry,ref=ghcr.io/${{ steps.lower.outputs.owner }}/prostate3d:buildcache,mode=max

      # ── 7. Print the pull command for Minerva ────────────────────────────────
      - name: Print Minerva pull command
        run: |
          echo ""
          echo "Image pushed. On Minerva, run:"
          echo ""
          echo "  bash /sc/arion/projects/video_rarp/3dprostate/pull_sif.sh"
          echo ""
          echo "  (which does: singularity build pipeline.sif \\"
          echo "   docker://ghcr.io/${{ steps.lower.outputs.owner }}/prostate3d:latest)"
          echo ""
